<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋生物之美：鮨科與蓑鮋屬</title>
    <meta name="referrer" content="no-referrer">
    <style>
        body {
            font-family: "微軟正黑體", Arial, sans-serif;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;

            /* 👇 新增的 GIF 背景魔法 👇 */
            background-color: #f4f8fb; /* 備用底色：如果 GIF 沒載入會顯示這個顏色 */
            background-image: url('ocean.gif'); /* 指向您的 GIF 檔案 */
            background-size: cover;       /* 讓 GIF 完美放大縮小，填滿整個螢幕 */
            background-position: center;  /* 讓 GIF 保持在正中央 */
            background-attachment: fixed; /* 【超讚效果】讓背景固定釘在牆上，文字滾動時背景不會跟著跑！ */
            background-repeat: no-repeat; /* 防止圖片太小而在畫面中像磁磚一樣重複拼貼 */
        }

       h1 {
            text-align: center;
            color: #ffffff; /* 將原本的深藍色改成純白色 */
            border-bottom: 2px solid #ffffff; /* 把下方的分隔線也改成白色 */
            padding-bottom: 10px;
            
            /* 👇 加上文字陰影魔法，讓字體立體浮現 👇 */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
        }
/* 👇 左上角專屬小字設計 👇 */
        .student-info {
            position: absolute; /* 絕對定位：讓它脫離原本的排版排隊規則 */
            top: 15px;          /* 距離網頁最上方 15 像素 */
            left: 15px;         /* 距離網頁最左邊 15 像素 */
            color: rgba(255, 255, 255, 0.8); /* 80% 不透明度的白色，低調又有質感 */
            font-size: 0.85em;  /* 字體稍微縮小 */
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9); /* 加上一點黑影，避免被背景吃掉 */
            z-index: 1000;      /* 確保它顯示在最上層，不會被圖片蓋住 */
        }
        /* 自己喜歡的文字區塊設計 */
        .intro-text {
            background-color: #fff;
            padding: 20px;
            border-left: 5px solid #2980b9;
            border-radius: 4px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.1em;
        }

        .gallery {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .image-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 48%;
            transition: transform 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-5px); /* 滑鼠游標移過去的浮現效果 */
        }

        /* 圖片設計，加上 pointer 讓使用者知道可以點擊 */
        .fish-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 條件1：圖片下方標題 */
        .img-title {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 條件2：圖片說明框 (預設隱藏) */
        #desc-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #e8f8f5;
            border: 2px dashed #1abc9c;
            border-radius: 8px;
            text-align: justify;
            font-size: 1.1em;
            color: #117a65;
            display: none; 
            box-shadow: 0 2px 10px rgba(26, 188, 156, 0.2);
        }
    </style>
</head>
<body>
    <div class="student-info">多元二甲 N13170031 陳均廷</div>
    <h1>深海的絢麗與危險</h1>

    <div class="intro-text">
        海洋是一個充滿神秘與美麗的湛藍宇宙。在這裡，花斑刺鰓鮨那猶如繁星般的斑斕色彩，展現了生命多樣性的奇蹟；而蓑鮋屬則披著華麗的戰袍，以優雅卻帶有劇毒的鰭條警告著世人。這兩種魚類完美詮釋了海洋的迷人與危險，每一次的潛水探險，都是一場視覺的饗宴與對大自然的敬畏。
    </div>

<div class="gallery">
        <div class="image-card">
            <img src="fish1.jpg" 
                 alt="花斑刺鰓鮨" 
                 class="fish-img"
                 data-desc="【圖片說明】花斑刺鰓鮨（學名：Cephalopholis argus）俗稱大斑石斑魚，屬於鮨科。牠們身上佈滿美麗的藍色斑點，是珊瑚礁生態系中重要的掠食者，通常躲藏在礁石中等待獵物，是潛水愛好者眼中的美麗明星。">
            <div class="img-title">花斑刺鰓鮨 (F338 Serranidae 鮨科)</div>
        </div>

        <div class="image-card">
            <img src="fish2.jpg" 
                 alt="蓑鮋屬" 
                 class="fish-img"
                 data-desc="【圖片說明】蓑鮋屬（學名：Pterois），俗稱獅子魚。擁有極具特徵的扇形胸鰭和長長的背鰭棘，雖然泳姿優雅迷人，但其背鰭帶有劇毒，是海洋中著名的「危險又美麗」的生物代表。">
            <div class="img-title">蓑鮋屬（學名：Pterois）</div>
        </div>
    </div>

    <div id="desc-box"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll('.fish-img');
            const descBox = document.getElementById('desc-box');

            // 1. 綁定圖片點擊事件 (顯示說明)
            images.forEach(function(img) {
                img.addEventListener('click', function(event) {
                    const description = this.getAttribute('data-desc');
                    descBox.innerHTML = '<strong>💡 探索海洋：</strong><br><br>' + description;
                    descBox.style.display = 'block';
                    descBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    
                    // 【關鍵小技巧】阻止事件「冒泡」傳遞給 document
                    event.stopPropagation(); 
                });
            });

            // 2. 綁定整個網頁的點擊事件 (點空白處隱藏)
            document.addEventListener('click', function(event) {
                // 如果點擊的目標不是圖片，也不是說明框裡面的東西，就把說明框隱藏
                if (!event.target.classList.contains('fish-img') && !descBox.contains(event.target)) {
                    descBox.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
